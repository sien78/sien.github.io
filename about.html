<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABOUT | SIEN</title>

  <link rel="stylesheet" href="transition.css" />

  <style>
    :root {
      --cyan: #31bfff;
      --blue: #0065d8;
      --deep-blue: #061b4a;
      --text: #071b46;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(6, 27, 74, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #eefaff 32%,
        #8ee4ff 68%,
        #0074d9 100%
      );
      overflow-x: hidden;
      animation: pageEnter 0.55s ease forwards;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      padding: 24px 54px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: rgba(255, 255, 255, 0.58);
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 3px;
      color: var(--deep-blue);
    }

    .logo span {
      color: var(--cyan);
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .menu a {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
      color: rgba(6, 27, 74, 0.68);
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.active {
      color: var(--blue);
    }

    .social {
      display: flex;
      gap: 16px;
    }

    .social a {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;

      border: 1px solid rgba(0, 101, 216, 0.24);
      border-radius: 6px;

      color: var(--blue);
      font-weight: 900;
      transition: 0.2s;
    }

    .social a:hover {
      background: var(--blue);
      color: white;
      transform: translateY(-2px);
    }

    .page {
      min-height: 100vh;
      padding: 150px 72px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      width: min(1120px, 100%);
    }

    .page-label {
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 12vw, 170px);
      line-height: 0.9;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -6px;
      color: var(--deep-blue);
    }

    .profile-card {
      margin-top: 42px;
      padding: 44px;

      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 42px;
      align-items: stretch;

      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(3, 50, 112, 0.17);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(49, 191, 255, 0.22), transparent 28%),
        radial-gradient(circle at 92% 82%, rgba(0, 101, 216, 0.18), transparent 30%);
      pointer-events: none;
    }

    .profile-image-box,
    .profile-info {
      position: relative;
      z-index: 1;
    }

    .profile-image-box {
      min-height: 460px;
      border-radius: 18px;
      border: 1px solid rgba(0, 101, 216, 0.18);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(213, 246, 255, 0.76)),
        radial-gradient(circle at 50% 35%, rgba(49, 191, 255, 0.22), transparent 38%);

      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(49, 191, 255, 0.13);
    }

    .profile-image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-placeholder {
      text-align: center;
      color: rgba(6, 27, 74, 0.38);
      font-weight: 900;
      letter-spacing: 2px;
    }

    .image-placeholder strong {
      display: block;
      margin-bottom: 12px;
      font-size: 28px;
      color: rgba(0, 101, 216, 0.48);
    }

    .image-placeholder span {
      font-size: 13px;
    }

    .profile-info {
      padding: 12px 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .profile-title {
      margin: 0 0 28px;
      color: var(--blue);
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .profile-list {
      display: grid;
      gap: 16px;
    }

    .profile-row {
      min-height: 62px;
      padding: 0 0 16px;
      display: grid;
      grid-template-columns: 150px 1fr;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .profile-row:last-child {
      border-bottom: none;
    }

    .profile-key {
      color: rgba(6, 27, 74, 0.48);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .profile-value {
      color: var(--deep-blue);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .profile-value.pending {
      color: rgba(6, 27, 74, 0.58);
    }

    .back-link {
      display: inline-block;
      margin-top: 34px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 980px) {
      .top-nav {
        position: static;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
      }

      .menu {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
      }

      .page {
        padding: 70px 24px;
      }

      h1 {
        letter-spacing: -3px;
      }

      .profile-card {
        grid-template-columns: 1fr;
        padding: 28px;
        gap: 28px;
      }

      .profile-image-box {
        min-height: 380px;
      }

      .profile-row {
        grid-template-columns: 120px 1fr;
      }

      .profile-value {
        font-size: 20px;
      }
    }

    @media (max-width: 560px) {
      .profile-card {
        padding: 22px;
      }

      .profile-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .profile-key {
        font-size: 12px;
      }

      .profile-value {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <header class="top-nav">
    <a href="index.html" class="logo">SIEN<span>✦</span></a>

    <nav class="menu">
      <a href="index.html">HOME</a>
      <a href="about.html" class="active">ABOUT</a>
      <a href="lore.html">LORE</a>
      <a href="gallery.html">GALLERY</a>
      <a href="fanart.html">FANART</a>
      <a href="ranking.html">RANKING</a>
      <a href="support.html">SUPPORT</a>
    </nav>

    <div class="social">
      <a href="#" aria-label="X">X</a>
      <a href="#" aria-label="YouTube">▶</a>
      <a href="#" aria-label="TikTok">♪</a>
    </div>
  </header>

  <main class="page">
    <section class="content">
      <div class="page-label">02 / ABOUT</div>
      <h1>ABOUT</h1>

      <div class="profile-card">
        <div class="profile-image-box">
          <!-- 프로필 이미지가 생기면 아래 주석을 풀고 이미지 파일명을 맞춰줘 -->
          <!-- <img src="profile.png" alt="SIEN 프로필 이미지" /> -->

          <div class="image-placeholder">
            <strong>PROFILE</strong>
            <span>IMAGE COMING SOON</span>
          </div>
        </div>

        <div class="profile-info">
          <h2 class="profile-title">PROFILE</h2>

          <div class="profile-list">
            <div class="profile-row">
              <div class="profile-key">NAME</div>
              <div class="profile-value">시엔 / SIEN</div>
            </div>

            <div class="profile-row">
              <div class="profile-key">GENDER</div>
              <div class="profile-value">남성</div>
            </div>

            <div class="profile-row">
              <div class="profile-key">BIRTHDAY</div>
              <div class="profile-value">7월 21일</div>
            </div>

            <div class="profile-row">
              <div class="profile-key">MAMA</div>
              <div class="profile-value pending">미정</div>
            </div>

            <div class="profile-row">
              <div class="profile-key">PAPA</div>
              <div class="profile-value pending">미정</div>
            </div>

            <div class="profile-row">
              <div class="profile-key">FAN NAME</div>
              <div class="profile-value pending">미정</div>
            </div>
          </div>
        </div>
      </div>

      <a href="index.html" class="back-link">← HOME으로 돌아가기</a>
    </section>
  </main>

  <script src="transition.js"></script>
</body>
</html>
