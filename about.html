<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABOUT | SIEN</title>

  <style>
    :root {
      --cyan: #31bfff;
      --blue: #0065d8;
      --deep-blue: #061b4a;
      --text: #071b46;
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(6, 27, 74, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #eefaff 32%,
        #8ee4ff 68%,
        #0074d9 100%
      );
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(520px, 30vw);
    }

    .content {
      position: relative;
      min-height: 100vh;
      padding: 70px 70px;
      display: flex;
      align-items: center;
    }

    .box {
      width: min(860px, 100%);
      padding: 52px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(3, 50, 112, 0.14);
      backdrop-filter: blur(10px);
    }

    .page-number {
      color: var(--blue);
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(64px, 8vw, 130px);
      line-height: 0.9;
      font-weight: 900;
      font-style: italic;
      color: var(--deep-blue);
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 600;
    }

    .home-link {
      display: inline-block;
      margin-top: 34px;
      color: var(--blue);
      font-weight: 900;
      letter-spacing: 1px;
    }

    .side-panel {
      position: relative;
      min-height: 100vh;
      padding: 36px 44px 36px 118px;
      color: white;
      background: linear-gradient(
        180deg,
        rgba(5, 30, 88, 0.98),
        rgba(1, 9, 37, 0.98)
      );
      clip-path: polygon(9% 0, 100% 0, 100% 100%, 0 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding-bottom: 28px;
      margin-left: -20px;
      border-bottom: 1px solid rgba(255,255,255,0.22);
      font-size: 20px;
      font-weight: 800;
    }

    .social a:hover {
      color: var(--cyan);
    }

    .menu {
      margin-top: 24px;
    }

    .menu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      transition: 0.2s;
    }

    .menu span {
      font-size: clamp(30px, 3vw, 48px);
      font-weight: 900;
      font-style: italic;
      color: rgba(255,255,255,0.92);
      letter-spacing: 1px;
    }

    .menu small {
      color: var(--cyan);
      font-size: 18px;
      font-weight: 800;
    }

    .menu a.active span,
    .menu a:hover span {
      color: var(--cyan);
    }

    .menu a:hover {
      transform: translateX(8px);
    }

    .join-box {
      padding: 22px 24px;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
    }

    .join-box h3 {
      margin: 0 0 18px;
      font-size: 21px;
      letter-spacing: 1px;
    }

    .join-icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .join-icons a {
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      font-size: 20px;
      font-weight: 800;
    }

    .join-icons a:hover {
      background: rgba(49,191,255,0.18);
      color: var(--cyan);
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .content {
        min-height: auto;
        padding: 40px 24px;
      }

      .box {
        padding: 34px 26px;
      }

      .side-panel {
        min-height: auto;
        clip-path: none;
        padding: 32px 24px;
      }

      .menu span {
        font-size: 36px;
      }

      .join-box {
        margin-top: 30px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <div class="box">
        <div class="page-number">02 / ABOUT</div>
        <h1>ABOUT</h1>
        <p>
          시엔에 대한 소개를 정리하는 공간입니다.
          캐릭터 소개, 활동 방향, 팬네임, 좋아하는 것, 싫어하는 것 등을 이곳에 넣을 수 있습니다.
        </p>
        <a href="index.html" class="home-link">← HOME으로 돌아가기</a>
      </div>
    </section>

    <aside class="side-panel">
      <div>
        <div class="social">
          <a href="#">X</a>
          <a href="#">▶</a>
          <a href="#">♪</a>
        </div>

        <nav class="menu">
          <a href="index.html"><span>HOME</span><small>01</small></a>
          <a href="about.html" class="active"><span>ABOUT</span><small>02</small></a>
          <a href="lore.html"><span>LORE</span><small>03</small></a>
          <a href="gallery.html"><span>GALLERY</span><small>04</small></a>
          <a href="fanart.html"><span>FANART</span><small>05</small></a>
          <a href="ranking.html"><span>RANKING</span><small>06</small></a>
          <a href="support.html"><span>SUPPORT</span><small>07</small></a>
        </nav>
      </div>

      <div class="join-box">
        <h3>SIEN COMMUNITY</h3>
        <div class="join-icons">
          <a href="#">X</a>
          <a href="#">▶</a>
          <a href="#">♪</a>
        </div>
      </div>
    </aside>
  </main>
</body>
</html>
