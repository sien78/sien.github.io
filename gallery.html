<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GALLERY | SIEN</title>

  
  <link rel="stylesheet" href="transition.css" />
<style>
    :root {
      --cyan: #31bfff;
      --blue: #0065d8;
      --deep-blue: #061b4a;
      --text: #071b46;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(6, 27, 74, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #eefaff 32%,
        #8ee4ff 68%,
        #0074d9 100%
      );
      overflow-x: hidden;
      animation: pageEnter 0.55s ease forwards;
    }

    body.is-leaving {
      animation: pageLeave 0.35s ease forwards;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageLeave {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-18px);
      }
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      padding: 24px 54px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: rgba(255, 255, 255, 0.58);
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 3px;
      color: var(--deep-blue);
    }

    .logo span {
      color: var(--cyan);
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .menu a {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
      color: rgba(6, 27, 74, 0.68);
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.active {
      color: var(--blue);
    }

    .social {
      display: flex;
      gap: 16px;
    }

    .social a {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;

      border: 1px solid rgba(0, 101, 216, 0.24);
      border-radius: 6px;

      color: var(--blue);
      font-weight: 900;
      transition: 0.2s;
    }

    .social a:hover {
      background: var(--blue);
      color: white;
      transform: translateY(-2px);
    }

    .page {
      min-height: 100vh;
      padding: 150px 72px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      width: min(1100px, 100%);
    }

    .page-label {
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(68px, 11vw, 160px);
      line-height: 0.9;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -6px;
      color: var(--deep-blue);
    }

    .content-card {
      margin-top: 42px;
      padding: 42px;

      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(3, 50, 112, 0.16);
      backdrop-filter: blur(12px);
    }

    .content-card h2 {
      margin: 0 0 18px;
      font-size: 28px;
      color: var(--blue);
    }

    .content-card p {
      margin: 0;
      max-width: 760px;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 600;
    }

    .gallery-grid {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .gallery-item {
      height: 160px;
      border-radius: 12px;
      border: 1px solid rgba(0, 101, 216, 0.18);
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.9),
        rgba(49, 191, 255, 0.22)
      );
      display: grid;
      place-items: center;
      color: var(--blue);
      font-weight: 900;
      letter-spacing: 1px;
    }

    .back-link {
      display: inline-block;
      margin-top: 34px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    @media (max-width: 900px) {
      .top-nav {
        position: static;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
      }

      .menu {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
      }

      .page {
        padding: 70px 24px;
      }

      h1 {
        letter-spacing: -3px;
      }

      .content-card {
        padding: 28px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="top-nav">
    <a href="index.html" class="logo">SIEN<span>✦</span></a>

    <nav class="menu">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="lore.html">LORE</a>
      <a href="gallery.html" class="active">GALLERY</a>
      <a href="fanart.html">FANART</a>
      <a href="ranking.html">RANKING</a>
      <a href="support.html">SUPPORT</a>
    </nav>

    <div class="social">
      <a href="#" aria-label="X">X</a>
      <a href="#" aria-label="YouTube">▶</a>
      <a href="#" aria-label="TikTok">♪</a>
    </div>
  </header>

  <main class="page">
    <section class="content">
      <div class="page-label">04 / GALLERY</div>
      <h1>GALLERY</h1>

      <div class="content-card">
        <h2>갤러리</h2>
        <p>
          공식 일러스트, 썸네일, 이미지 자료를 모아두는 공간입니다.
          나중에 캐릭터 이미지나 배너 이미지를 이곳에 추가하면 됩니다.
        </p>

        <div class="gallery-grid">
          <div class="gallery-item">IMAGE 01</div>
          <div class="gallery-item">IMAGE 02</div>
          <div class="gallery-item">IMAGE 03</div>
        </div>

        <a href="index.html" class="back-link">← HOME으로 돌아가기</a>
      </div>
    </section>
  </main>
  <script src="transition.js"></script>
</body>
</html>
