<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SUPPORT | SIEN</title>

  
  <link rel="stylesheet" href="transition.css" />
<style>
    :root {
      --cyan: #31bfff;
      --blue: #0065d8;
      --deep-blue: #061b4a;
      --text: #071b46;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(6, 27, 74, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #eefaff 32%,
        #8ee4ff 68%,
        #0074d9 100%
      );
      overflow-x: hidden;
      animation: pageEnter 0.55s ease forwards;
    }

    body.is-leaving {
      animation: pageLeave 0.35s ease forwards;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageLeave {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-18px);
      }
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      padding: 24px 54px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: rgba(255, 255, 255, 0.58);
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 3px;
      color: var(--deep-blue);
    }

    .logo span {
      color: var(--cyan);
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .menu a {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
      color: rgba(6, 27, 74, 0.68);
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.active {
      color: var(--blue);
    }

    .social {
      display: flex;
      gap: 16px;
    }

    .social a {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;

      border: 1px solid rgba(0, 101, 216, 0.24);
      border-radius: 6px;

      color: var(--blue);
      font-weight: 900;
      transition: 0.2s;
    }

    .social a:hover {
      background: var(--blue);
      color: white;
      transform: translateY(-2px);
    }

    .page {
      min-height: 100vh;
      padding: 150px 72px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      width: min(1100px, 100%);
    }

    .page-label {
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(68px, 11vw, 160px);
      line-height: 0.9;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -6px;
      color: var(--deep-blue);
    }

    .content-card {
      margin-top: 42px;
      padding: 42px;

      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(3, 50, 112, 0.16);
      backdrop-filter: blur(12px);
    }

    .content-card h2 {
      margin: 0 0 18px;
      font-size: 28px;
      color: var(--blue);
    }

    .content-card p {
      margin: 0;
      max-width: 760px;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 600;
    }

    .support-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 32px;
    }

    .support-button {
      padding: 18px 20px;
      border-radius: 8px;
      border: 1px solid rgba(0, 101, 216, 0.2);
      background: rgba(0, 101, 216, 0.08);
      color: var(--blue);
      font-weight: 900;
      text-align: center;
      transition: 0.2s;
    }

    .support-button:hover {
      background: var(--blue);
      color: white;
      transform: translateY(-3px);
    }

    .back-link {
      display: inline-block;
      margin-top: 34px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    @media (max-width: 900px) {
      .top-nav {
        position: static;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
      }

      .menu {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
      }

      .page {
        padding: 70px 24px;
      }

      h1 {
        letter-spacing: -3px;
      }

      .content-card {
        padding: 28px;
      }

      .support-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="top-nav">
    <a href="index.html" class="logo">SIEN<span>✦</span></a>

    <nav class="menu">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="lore.html">LORE</a>
      <a href="gallery.html">GALLERY</a>
      <a href="fanart.html">FANART</a>
      <a href="ranking.html">RANKING</a>
      <a href="support.html" class="active">SUPPORT</a>
    </nav>

    <div class="social">
      <a href="#" aria-label="X">X</a>
      <a href="#" aria-label="YouTube">▶</a>
      <a href="#" aria-label="TikTok">♪</a>
    </div>
  </header>

  <main class="page">
    <section class="content">
      <div class="page-label">07 / SUPPORT</div>
      <h1>SUPPORT</h1>

      <div class="content-card">
        <h2>후원 안내</h2>
        <p>
          후원 링크, 후원 안내, 후원자 혜택을 정리하는 공간입니다.
          나중에 투네이션, 팬딩, 기타 후원 페이지 링크를 연결할 수 있습니다.
        </p>

        <div class="support-buttons">
          <a href="#" class="support-button">후원하러 가기</a>
          <a href="ranking.html" class="support-button">후원자 랭킹 보기</a>
        </div>

        <a href="index.html" class="back-link">← HOME으로 돌아가기</a>
      </div>
    </section>
  </main>
  <script src="transition.js"></script>
</body>
</html>
